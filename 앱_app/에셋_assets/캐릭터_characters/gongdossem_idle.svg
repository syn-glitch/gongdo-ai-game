<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- 책 (가슴 아래) -->
  <rect x="32" y="92" width="56" height="18" rx="2" fill="#FCC419" stroke="#1A1A1A" stroke-width="2.5"/>
  <line x1="60" y1="92" x2="60" y2="110" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- 머리 본체 -->
  <circle cx="60" cy="52" r="38" fill="#FF922B" stroke="#1A1A1A" stroke-width="3" filter="url(#sh)"/>
  <!-- 머리카락 (살짝 위) -->
  <path d="M28 38 Q44 18 60 22 Q76 18 92 38 Q86 30 78 28 Q70 22 60 24 Q50 22 42 28 Q34 30 28 38 Z"
        fill="#5C3317" stroke="#1A1A1A" stroke-width="2"/>
  <!-- 안경 -->
  <circle cx="46" cy="52" r="11" fill="none" stroke="#1A1A1A" stroke-width="2.8"/>
  <circle cx="74" cy="52" r="11" fill="none" stroke="#1A1A1A" stroke-width="2.8"/>
  <line x1="57" y1="52" x2="63" y2="52" stroke="#1A1A1A" stroke-width="2.8"/>
  <!-- 안경 렌즈 반짝 -->
  <path d="M40 47 L42 45" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <path d="M68 47 L70 45" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- 눈 (안경 안) -->
  <circle cx="46" cy="53" r="3" fill="#1A1A1A"/>
  <circle cx="74" cy="53" r="3" fill="#1A1A1A"/>
  <!-- 볼 -->
  <circle cx="32" cy="62" r="4" fill="#FFA8A8" opacity="0.7"/>
  <circle cx="88" cy="62" r="4" fill="#FFA8A8" opacity="0.7"/>
  <!-- 다정한 미소 -->
  <path d="M48 72 Q60 80 72 72" fill="none" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
</svg>
